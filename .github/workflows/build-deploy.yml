name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'source/**'
      - 'convert.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install jinja2 markdown-it-py

      - name: Build HTML
        run: python3 convert.py

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "build: auto-generated HTML from source/ [skip ci]"
          git push

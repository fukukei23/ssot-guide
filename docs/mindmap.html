<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSOT 全体マップ</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d1117;
      --header-bg: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-sub: #adbac7;
      --text-muted: #768390;
      --panel-bg: #161b22;
      --panel-title: #79c0ff;
      --tag-bg: #21262d;
      --tag-border: #444c56;
      --path-bg: #0d1117;
      --path-color: #56d364;
      --node-text: #e6edf3;
      --btn-bg: #21262d;
      --btn-hover: #30363d;
      --hint: #444c56;
    }
    :root[data-theme="light"] {
      --bg: #ffffff;
      --header-bg: #f6f8fa;
      --border: #d0d7de;
      --text: #1f2328;
      --text-sub: #24292f;
      --text-muted: #57606a;
      --panel-bg: #f6f8fa;
      --panel-title: #0969da;
      --tag-bg: #eaeef2;
      --tag-border: #d0d7de;
      --path-bg: #ffffff;
      --path-color: #1a7f37;
      --node-text: #1f2328;
      --btn-bg: #eaeef2;
      --btn-hover: #d0d7de;
      --hint: #adb5bd;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    header {
      padding: 0 16px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      height: 48px;
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 700; flex-shrink: 0; }
    header .hint-text { font-size: 11px; color: var(--text-muted); flex: 1; }

    .theme-btn {
      flex-shrink: 0;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .theme-btn:hover { background: var(--btn-hover); }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #mindmap-svg {
      flex: 1;
      display: block;
      min-width: 0;
    }

    /* markmapのノードテキスト色を上書き */
    #mindmap-svg text,
    #mindmap-svg .markmap-foreign div {
      color: var(--node-text) !important;
      fill: var(--node-text) !important;
    }

    /* 右サイドパネル */
    #side-panel {
      width: 0;
      overflow: hidden;
      background: var(--panel-bg);
      border-left: 1px solid var(--border);
      transition: width 0.25s ease, background 0.2s;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    #side-panel.open { width: 300px; }

    #side-panel-inner {
      width: 300px;
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--panel-title);
      margin-bottom: 12px;
      line-height: 1.4;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .panel-desc {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.8;
      margin-bottom: 14px;
    }
    .panel-tags { margin-bottom: 12px; }
    .tag {
      display: inline-block;
      font-size: 11px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      border-radius: 20px;
      padding: 2px 9px;
      margin: 3px 3px 0 0;
      color: var(--text-muted);
    }
    .panel-path {
      font-size: 11px;
      color: var(--path-color);
      font-family: 'Consolas', monospace;
      word-break: break-all;
      background: var(--path-bg);
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      line-height: 1.5;
    }

    #hint {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--hint);
      pointer-events: none;
      transition: opacity 0.5s;
      white-space: nowrap;
    }
    #hint.hidden { opacity: 0; }

    /* ── スマホ対応 ── */
    @media (max-width: 640px) {
      header h1 { font-size: 13px; }
      .hint-text { display: none; }

      /* パネルは下から出るシート */
      .main { flex-direction: column; }
      #side-panel {
        width: 100% !important;
        height: 0;
        border-left: none;
        border-top: 1px solid var(--border);
        transition: height 0.25s ease, background 0.2s;
      }
      #side-panel.open { width: 100% !important; height: 45vh; }
      #side-panel-inner { width: 100%; padding: 14px 16px; }
      #mindmap-svg { width: 100%; height: auto; flex: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🗺️ SSOT 全体マップ</h1>
    <span class="hint-text">スクロール: ズーム ／ ドラッグ: 移動 ／ ノードタップ: 詳細</span>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">
      <span id="theme-icon">☀️</span>
      <span id="theme-label">ライトモード</span>
    </button>
  </header>
  <div class="main">
    <svg id="mindmap-svg"></svg>
    <div id="side-panel">
      <div id="side-panel-inner">
        <div class="panel-title" id="panel-title"></div>
        <div class="panel-desc"  id="panel-desc"></div>
        <div class="panel-tags"  id="panel-tags"></div>
        <div class="panel-path"  id="panel-path" style="display:none"></div>
      </div>
    </div>
  </div>
  <div id="hint">ノードをタップすると右に説明が表示されます</div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.17"></script>
  <script>
    // ─── テーマ切替 ───
    function toggleTheme() {
      const html  = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('theme-icon').textContent  = isDark ? '🌙' : '☀️';
      document.getElementById('theme-label').textContent = isDark ? 'ダークモード' : 'ライトモード';
      // markmapのSVGテキスト色を再適用
      applyNodeTextColor();
    }

    function applyNodeTextColor() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const color  = isDark ? '#e6edf3' : '#1f2328';
      document.querySelectorAll('#mindmap-svg text').forEach(el => {
        el.style.fill = color;
      });
      document.querySelectorAll('#mindmap-svg .markmap-foreign div').forEach(el => {
        el.style.color = color;
      });
    }

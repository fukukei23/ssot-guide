    const tooltip = document.getElementById('tooltip');

    function showTooltip(event, text) {
      const info = descriptions[text.trim()];
      if (!info) return;

      const tags = (info.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
      const pathHtml = info.path ? `<div class="path">📁 ${info.path}</div>` : '';

      tooltip.innerHTML = `<h3>${text.trim()}</h3><p>${info.desc}</p>${tags}${pathHtml}`;
      tooltip.classList.add('visible');
      positionTooltip(event);
    }

    function positionTooltip(event) {
      const x = event.clientX + 16;
      const y = event.clientY - 10;
      const tw = tooltip.offsetWidth;
      const th = tooltip.offsetHeight;
      tooltip.style.left = (x + tw > window.innerWidth ? x - tw - 32 : x) + 'px';
      tooltip.style.top  = (y + th > window.innerHeight ? y - th : y) + 'px';
    }

    function hideTooltip() {
      tooltip.classList.remove('visible');
    }

    window.addEventListener('load', async () => {
      const { Transformer } = window.markmap;
      const { Markmap, loadCSS, loadJS } = window.markmap;

      const transformer = new Transformer();
      const { root, features } = transformer.transform(markdown.trim());

      const { styles, scripts } = transformer.getUsedAssets(features);
      if (styles) loadCSS(styles);
      if (scripts) await loadJS(scripts, { getMarkmap: () => window.markmap });

      const svg = document.getElementById('mindmap-svg');
      const mm = Markmap.create(svg, {
        colorFreezeLevel: 2,
        initialExpandLevel: 2,
        maxWidth: 280,
        duration: 400,
      }, root);

      window.addEventListener('resize', () => mm.fit());

      // クリックイベント：markmapのノードテキストを拾う
      svg.addEventListener('click', (e) => {
        const target = e.target.closest('g.markmap-node');
        if (!target) { hideTooltip(); return; }
        const textEl = target.querySelector('foreignObject div, text');
        const text = textEl ? textEl.textContent : '';
        if (text) showTooltip(e, text);
      });

      // 背景クリックで閉じる
      document.addEventListener('click', (e) => {
        if (!e.target.closest('g.markmap-node')) hideTooltip();
      });
    });
  </script>
